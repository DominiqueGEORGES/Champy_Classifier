# Default training hyperparameters for Champy Classifier
# Override any field via environment variables (prefix TRAIN_) or .env

model_name: resnet50
num_classes: 30
pretrained: true

# Fine-tuning two phases :
# - phase 1 : backbone frozen, only the head is trained (lr_phase1)
# - phase 2 : backbone unfrozen, full fine-tuning (lr_phase2)
# Set freeze_backbone_epochs to 0 to skip phase 1 entirely.
freeze_backbone_epochs: 10
total_epochs: 30
lr_phase1: 1.0e-3
lr_phase2: 1.0e-5

batch_size: 16
seed: 42

optimizer: adamw
weight_decay: 1.0e-4
scheduler: cosine

early_stopping_patience: 5
early_stopping_metric: val_loss

mixed_precision: true
gradient_accumulation_steps: 1
num_workers: 0

image_size: 224
augmentation: true
