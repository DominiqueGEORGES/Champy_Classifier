worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Streamlit a besoin de WebSockets pour le live update
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # Logs format minimal
    log_format simple '$time_iso8601 [$remote_addr] $request -> $status (${request_time}s)';
    access_log /var/log/nginx/access.log simple;

    # Rate limiting basique : 30 requêtes/seconde par IP
    limit_req_zone $binary_remote_addr zone=demo:10m rate=200r/s;

    server {
        listen 80;
        server_name _;

        # Headers de sécurité standards
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # API BentoML : proxy transparent vers le service api du compose.
        # Le trailing slash sur proxy_pass strip le préfixe /api/ avant de
        # transmettre à l'API (qui ne sait pas qu'elle vit sous /api/).
        location /api/ {
            limit_req zone=demo burst=300 nodelay;
            proxy_pass http://api:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;
            proxy_read_timeout 60;
        }

        # MLflow : on conserve le préfixe /mlflow/ car --static-prefix le requiert
        location /mlflow/ {
            proxy_pass http://mlflow:5000/mlflow/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        # Airflow : strip /airflow/, Airflow utilise X-Forwarded-Prefix pour
        # générer ses URLs avec le bon préfixe (login, assets, redirections).
        location /airflow/ {
            proxy_pass http://airflow:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120;
        }

        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 60;
        }

        location /prometheus/ {
            proxy_pass http://prometheus:9090;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        location /alertmanager/ {
            proxy_pass http://alertmanager:9093;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60;
        }

        location /minio/ {
            proxy_pass http://minio:9001/;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_read_timeout 60;
            client_max_body_size 100M;
        }

        # Endpoint de healthcheck Docker (interne, pas exposé)
        location = /nginx-health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'OK\n';
        }

        # Favicon du site (sinon /favicon.ico tombe sur Streamlit -> 404)
        location = /favicon.ico {
            root /etc/nginx;
            default_type image/x-icon;
            access_log off;
            expires 7d;
        }

        # Streamlit demo (UI principale)
        location / {
            limit_req zone=demo burst=300 nodelay;
            proxy_pass http://demo:8501;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

    }
}
