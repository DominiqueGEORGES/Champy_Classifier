# Docker Compose - stack Champy Classifier (NUC3).
#
# Mapping des ports : le NUC3 est un hôte partagé qui héberge plusieurs
# projets. On applique un offset projet (+10) sur les ports standards
# déjà occupés par d'autres services. Voir PLAYBOOK.md (piège
# "cohabitation sur hôte partagé").
#
#   API FastAPI  8010:8000  (8000 pris par un autre projet)
#   Streamlit    8501:8501  (libre, pas de remap)
#   Prometheus   9090:9090  (libre, pas de remap)
#   Grafana      3010:3000  (3000 pris par un autre projet)
#
# Le port interne du container reste standard : les services entre
# containers se parlent via le network docker-compose par nom de
# service (ex: prometheus scrape api:8000), donc seul le port host
# change.

services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8010:8000"
    volumes:
      - ./models:/app/models:ro
      # data/runtime/ accueille la DB SQLite des predictions (PredictionStore,
      # Bloc M2). FastAPI n'utilise pas le store - le volume est prepare ici
      # pour que le service BentoML qui le remplace au Bloc 5 (api-bento)
      # trouve la base persistee. Le path SQLite est configure via
      # CHAMPY_PREDICTIONS_DB et pointe sur /app/data/runtime/predictions.db.
      - ./data/runtime:/app/data/runtime
    env_file: .env
    environment:
      - CHAMPY_PREDICTIONS_DB=/app/data/runtime/predictions.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  demo:
    build:
      context: .
      dockerfile: docker/Dockerfile.demo
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      # La demo Streamlit tape sur l'API via le network interne du compose.
      - CHAMPY_API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3010:3000"
    volumes:
      # Provisioning auto : datasource Prometheus + provider de dashboards.
      # Lu au boot par Grafana, recharge automatiquement les dashboards si
      # les fichiers JSON sont modifies (intervalle = 30s).
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      # Auth anonyme + embedding pour les iframes Streamlit (page 10).
      # Acceptable en demo locale ; en prod il faudrait un reverse proxy
      # avec auth deleguee. Voir PLAYBOOK.md (piege "Grafana iframe").
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_AUTH_ANONYMOUS_HIDE_VERSION=true
      - GF_SECURITY_ALLOW_EMBEDDING=true
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:
